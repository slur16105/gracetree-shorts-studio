name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: engine/requirements.lock
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --requirement engine/requirements.lock
      - run: python -m pip install --no-build-isolation --no-deps ./engine
      - run: python -m pip check
      - run: pnpm run ci
      - run: xvfb-run --auto-servernum pnpm test:e2e
