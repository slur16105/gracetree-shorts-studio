name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: pip
          cache-dependency-path: engine/requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --requirement engine/requirements.lock
          python -m pip install --no-build-isolation --no-deps ./engine
          python -m pip install pyinstaller

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage FFmpeg for Windows
        shell: pwsh
        run: |
          $dest = "resources\ffmpeg\win32"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # Install ffmpeg via winget/scoop then copy binaries into resources
          # so electron-builder can include them in extraResources.
          scoop install ffmpeg --global
          Copy-Item "$env:SCOOP\shims\ffmpeg.exe"  "$dest\ffmpeg.exe"
          Copy-Item "$env:SCOOP\shims\ffprobe.exe" "$dest\ffprobe.exe"

      - name: Build Python engine bundle
        run: node scripts/build-engine.mjs --platform win32

      - name: Build desktop installer
        run: node scripts/build-desktop.mjs --platform win32 --arch x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/installer/*.exe | Select-Object -First 1
          node scripts/verify-package.mjs --installer "$($installer.FullName)" --platform win32

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: apps/desktop/dist/installer/*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: pip
          cache-dependency-path: engine/requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --requirement engine/requirements.lock
          python -m pip install --no-build-isolation --no-deps ./engine
          python -m pip install pyinstaller

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage FFmpeg for macOS
        run: |
          brew install ffmpeg
          dest="resources/ffmpeg/darwin"
          mkdir -p "$dest"
          cp "$(which ffmpeg)"  "$dest/ffmpeg"
          cp "$(which ffprobe)" "$dest/ffprobe"

      - name: Build Python engine bundle
        run: node scripts/build-engine.mjs --platform darwin

      - name: Build desktop installer
        run: node scripts/build-desktop.mjs --platform darwin --arch arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify installer
        run: |
          installer=$(ls apps/desktop/dist/installer/*.dmg | head -1)
          node scripts/verify-package.mjs --installer "$installer" --platform darwin

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-installer
          path: apps/desktop/dist/installer/*.dmg
          retention-days: 30

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/artifacts/windows-x64-installer/*.exe
            dist/artifacts/macos-arm64-installer/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
