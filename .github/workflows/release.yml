name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Release channel: 'external' requires signing credentials in secrets.
# Builds without signing credentials are tagged 'development' and blocked from external release.
env:
  RELEASE_CHANNEL: ${{ secrets.CSC_LINK != '' && 'external' || 'development' }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: pip
          cache-dependency-path: engine/requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --requirement engine/requirements.lock
          python -m pip install --no-build-isolation --no-deps ./engine
          python -m pip install pyinstaller

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage FFmpeg for Windows
        shell: pwsh
        run: |
          $dest = "resources\ffmpeg\win32"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # Install ffmpeg via winget/scoop then copy binaries into resources
          # so electron-builder can include them in extraResources.
          scoop install ffmpeg --global
          Copy-Item "$env:SCOOP\shims\ffmpeg.exe"  "$dest\ffmpeg.exe"
          Copy-Item "$env:SCOOP\shims\ffprobe.exe" "$dest\ffprobe.exe"

      - name: Build Python engine bundle
        run: node scripts/build-engine.mjs --platform win32

      - name: Build desktop installer
        run: node scripts/build-desktop.mjs --platform win32 --arch x64
        env:
          # Signing secrets — only set when publishing externally.
          # CSC_LINK and CSC_KEY_PASSWORD must NOT be echoed or exposed in logs.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}

      - name: Verify installer (size + extension)
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/installer/*.exe | Select-Object -First 1
          node scripts/verify-package.mjs --installer "$($installer.FullName)" --platform win32

      - name: Signing gate
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/installer/*.exe | Select-Object -First 1
          node scripts/verify-signing.mjs --installer "$($installer.FullName)" --channel "$env:RELEASE_CHANNEL" --platform win32

      - name: Offline smoke test (no system Python/FFmpeg)
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/installer/*.exe | Select-Object -First 1
          .\tests\smoke\windows\install.ps1 -InstallerPath "$($installer.FullName)"
          .\tests\smoke\windows\offline-smoke.ps1 -SkipNetworkCheck

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: apps/desktop/dist/installer/*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: pip
          cache-dependency-path: engine/requirements.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --requirement engine/requirements.lock
          python -m pip install --no-build-isolation --no-deps ./engine
          python -m pip install pyinstaller

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage FFmpeg for macOS
        run: |
          brew install ffmpeg
          dest="resources/ffmpeg/darwin"
          mkdir -p "$dest"
          cp "$(which ffmpeg)"  "$dest/ffmpeg"
          cp "$(which ffprobe)" "$dest/ffprobe"

      - name: Build Python engine bundle
        run: node scripts/build-engine.mjs --platform darwin

      - name: Build desktop installer
        run: node scripts/build-desktop.mjs --platform darwin --arch arm64
        env:
          # Signing secrets — only set when publishing externally.
          # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID must NOT appear in logs.
          CSC_LINK: ${{ secrets.CSC_LINK_MAC }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD_MAC }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK_MAC != '' && 'true' || 'false' }}

      - name: Verify installer (size + extension)
        run: |
          installer=$(ls apps/desktop/dist/installer/*.dmg | head -1)
          node scripts/verify-package.mjs --installer "$installer" --platform darwin

      - name: Signing gate
        run: |
          installer=$(ls apps/desktop/dist/installer/*.dmg | head -1)
          node scripts/verify-signing.mjs --installer "$installer" --channel "$RELEASE_CHANNEL" --platform darwin

      - name: Offline smoke test (no system Python/FFmpeg)
        run: |
          installer=$(ls apps/desktop/dist/installer/*.dmg | head -1)
          ./tests/smoke/macos/install.sh "$installer"
          ./tests/smoke/macos/offline-smoke.sh --skip-network-check

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-installer
          path: apps/desktop/dist/installer/*.dmg
          retention-days: 30

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # External releases only — development channel builds stay as draft artifacts only.
          # The release body clearly marks unsigned/development builds to prevent misuse.
          body: |
            **Release channel:** ${{ env.RELEASE_CHANNEL }}
            ${{ env.RELEASE_CHANNEL == 'development' && '> ⚠️ This is a **development** build. It is unsigned and NOT intended for external distribution.' || '> ✅ This build has been signed and notarized for external distribution.' }}

            ---
          files: |
            dist/artifacts/windows-x64-installer/*.exe
            dist/artifacts/macos-arm64-installer/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Block publishing development builds as non-draft releases.
          prerelease: ${{ env.RELEASE_CHANNEL == 'development' }}
